<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Forgot Password</h2>
      <p class="subtitle">Enter your email to receive a reset token</p>
      
      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">Send Reset Token</button>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
      </form>
      
      <div class="auth-link">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'http://localhost:3000';

    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const errorDiv = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Failed to send reset token');
        }

        successDiv.innerHTML = `
            Reset token sent!<br>
            <input type="text" readonly 
            value="${data.reset_token}" 
            style="width: 100%; padding: 12px; font-size: 11px; background: #f5f5f5; border: 1px solid #ddd; border-radius: 5px; margin: 15px 0; font-family: monospace; cursor: pointer;"
            onclick="this.select(); this.setSelectionRange(0, this.value.length);"
            title="Click to select, then press Ctrl+C to copy">
             <br>
            <strong>Instructions:</strong> Click on the token above to select it, then press <strong>Ctrl+C</strong> to copy.<br>
            Then go to the <a href="reset-password.html">Reset Password page</a> and paste the token.`;
        successDiv.style.display = 'block';

        function copyToken() {
        const tokenElement = document.querySelector('#successMsg strong');
             if (tokenElement) {
        const token = tokenElement.innerText;
            navigator.clipboard.writeText(token);
            alert('Token copied to clipboard!');
            }
        }
        
        sessionStorage.setItem('resetEmail', email);
        
        setTimeout(() => {
          window.location.href = 'reset-password.html';
        }, 300000);

      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        submitBtn.textContent = 'Send Reset Token';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
