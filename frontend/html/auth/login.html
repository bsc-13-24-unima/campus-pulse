<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to access your campus services</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Login</button>
        
        <div id="errorMsg" class="error-message"></div>
      </form>
      
      <div class="auth-link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const errorDiv = document.getElementById('errorMsg');
      
      if (!email || !password) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.style.display = 'block';
        return;
      }
      
      // TODO: Connect to actual backend API
      // For now, demo login - will be replaced when backend is ready
      // This is a TEMPORARY solution for testing the frontend
      
      const BASE_URL = 'http://10.100.199.198:3000';

try {
  const response = await fetch(`${BASE_URL}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  
  const data = await response.json();
  
  if (response.ok) {
    sessionStorage.setItem('authToken', data.token);
    sessionStorage.setItem('userEmail', email);
    sessionStorage.setItem('userRole', data.role || 'student');
    window.location.href = '../dashboard.html';
  } else {
    errorDiv.textContent = data.message || 'Login failed';
    errorDiv.style.display = 'block';
  }
} catch (error) {
  errorDiv.textContent = 'Backend not reachable';
  errorDiv.style.display = 'block';
}
    });
  </script>
</body>
</html>
