<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to access your campus services</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary">Login</button>
        
        <div id="errorMsg" class="error-message"></div>
      </form>
      
      <div class="auth-link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </div>
  </div>
  
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      const errorDiv = document.getElementById('errorMsg');
      
      if (!email || !password) {
        errorDiv.textContent = 'Please fill in all fields';
        errorDiv.style.display = 'block';
        return;
      }
      
      // TODO: Connect to actual backend API
      // For now, demo login - will be replaced when backend is ready
      // This is a TEMPORARY solution for testing the frontend
      
      if (email.includes('admin')) {
        sessionStorage.setItem('authToken', 'demo-admin-token');
        sessionStorage.setItem('userEmail', email);
        sessionStorage.setItem('userRole', 'admin');
      } else {
        sessionStorage.setItem('authToken', 'demo-student-token');
        sessionStorage.setItem('userEmail', email);
        sessionStorage.setItem('userRole', 'student');
      }
      
      window.location.href = '../dashboard.html';
    });
  </script>
</body>
</html>
