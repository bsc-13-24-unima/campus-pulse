<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to access your campus services</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
        
        <div id="errorMsg" class="error-message"></div>
      </form>
      
      <div class="auth-link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
      <div class="auth-link">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'http://127.0.0.1:3000';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');

      errorDiv.style.display = 'none';

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          sessionStorage.setItem('authToken', data.token);
          sessionStorage.setItem('userRole', data.user?.role || 'student');
          sessionStorage.setItem('userEmail', email);
          window.location.href = '../dashboard.html';
        } else {
          errorDiv.textContent = data.message || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Cannot connect to backend. Make sure server is running.';
        errorDiv.style.display = 'block';
        console.error('Login error:', err);
      }
    });
</script>
</body>
</html>
