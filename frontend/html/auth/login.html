<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to access your campus services</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
        
        <div id="errorMsg" class="error-message"></div>
      </form>
      
      <div class="auth-link">
        Don't have an account? <a href="register.html">Register</a>
      </div>
      <div class="auth-link">
        <a href="forgot-password.html">Forgot Password?</a>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'http://localhost:3000';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorDiv.style.display = 'none';
      submitBtn.textContent = 'Logging in...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Login failed');
        }

        sessionStorage.setItem('authToken', data.token);
        sessionStorage.setItem('userEmail', data.user.email);
        sessionStorage.setItem('userRole', data.user.role);
        sessionStorage.setItem('userName', data.user.name);
        sessionStorage.setItem('userId', data.user.id);

        if (data.user.role === 'admin') {
          window.location.href = '../admin/dashboard.html';
        } else {
          window.location.href = '../dashboard.html';
        }

      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        submitBtn.textContent = 'Login';
        submitBtn.disabled = false;
      }

    });
  </script>
</body>
</html>
