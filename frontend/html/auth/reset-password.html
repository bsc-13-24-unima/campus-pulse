<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Reset Password</h2>
      <p class="subtitle">Enter your reset token and new password</p>
      
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <div class="form-group">
          <label for="token">Reset Token</label>
          <input type="text" id="token" placeholder="Paste the token you received via email" required>
        </div>
        
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password (min 8 characters)" required>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm your new password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
      </form>
      
      <div class="auth-link">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'http://localhost:3000';

    // Pre-fill email if coming from forgot-password page
    const savedEmail = sessionStorage.getItem('resetEmail');
    if (savedEmail) {
      document.getElementById('email').value = savedEmail;
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const token = document.getElementById('token').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      const errorDiv = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      // Validation
      if (newPassword !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (newPassword.length < 8) {
        errorDiv.textContent = 'Password must be at least 8 characters';
        errorDiv.style.display = 'block';
        return;
      }
      
      if (!token || token.length === 0) {
        errorDiv.textContent = 'Please enter your reset token';
        errorDiv.style.display = 'block';
        return;
      }

      submitBtn.textContent = 'Resetting...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPassword })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Failed to reset password');
        }

        successDiv.textContent = 'Password reset successfully! Redirecting to login...';
        successDiv.style.display = 'block';
        
        // Clear stored data
        sessionStorage.removeItem('resetEmail');
        sessionStorage.removeItem('resetToken');
        
        // Redirect to login after 3 seconds
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 3000);

      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        submitBtn.textContent = 'Reset Password';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
