<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="subtitle">Register with your university email</p>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
          <label for="email">University Email</label>
          <input type="email" id="email" placeholder="student@unima.ac.mw" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 8 characters" required>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Re-enter password" required>
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">Register</button>
        
        <div id="errorMsg" class="error-message"></div>
        <div id="successMsg" class="success-message"></div>
      </form>
      
      <div class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </div>
    </div>
  </div>
  
  <script>
    const API_URL = 'http://localhost:3000';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorDiv = document.getElementById('errorMsg');
      const successDiv = document.getElementById('successMsg');
      const submitBtn = document.getElementById('submitBtn');

      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';

      if (password !== confirmPassword) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        return;
      }

      if (!email.endsWith('@unima.ac.mw')) {
        errorDiv.textContent = 'Please use your university email (@unima.ac.mw)';
        errorDiv.style.display = 'block';
        return;
      }

      submitBtn.textContent = 'Registering...';
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Registration failed');
        }

        successDiv.textContent = 'Account created successfully! Redirecting to login...';
        successDiv.style.display = 'block';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);

      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        submitBtn.textContent = 'Register';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
