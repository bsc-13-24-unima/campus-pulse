
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Announcements - Campus Pulse</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <nav class="navbar">
    <h1>🎓 Campus Pulse</h1>
    <div>
      <a href="../dashboard.html">Dashboard</a>
      <a href="index.html" style="color: white;">Announcements</a>
      <a href="../lost-found/index.html">Lost & Found</a>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <h2>📢 Campus Announcements</h2>
      <p>Official announcements from university administration and canteen.</p>
    </div>

    <div id="announcementsList">
      <!-- Announcements will appear here -->
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000';

    // Check if user is logged in
    const token = sessionStorage.getItem('authToken');
    if (!token) {
      window.location.href = '../index.html';
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      sessionStorage.removeItem('authToken');
      window.location.href = '../index.html';
    });

    // Load announcements from backend API
    async function loadAnnouncements() {
      const container = document.getElementById('announcementsList');
      container.innerHTML = '<p>Loading announcements...</p>';
      
      try {
        const response = await fetch(`${API_URL}/announcements`, {
          headers: {
            'Authorization': 'Bearer ' + token
          }
        });

        if (response.ok) {
          const announcements = await response.json();
          displayAnnouncements(announcements);
        } else {
          container.innerHTML = '<p>Failed to load announcements. Please try again later.</p>';
        }
      } catch (error) {
        console.error('Error loading announcements:', error);
        container.innerHTML = '<p>Error loading announcements. Make sure the backend is running.</p>';
      }
    }

    function displayAnnouncements(announcements) {
      const container = document.getElementById('announcementsList');

      if (!announcements || announcements.length === 0) {
        container.innerHTML = '<p>No announcements yet.</p>';
        return;
      }

      container.innerHTML = announcements.map(announcement => `
        <div class="announcement-card">
          <h3>${announcement.title || 'Untitled'}</h3>
          <p>${announcement.content || 'No content'}</p>
          <div class="announcement-meta">
            Posted on ${new Date(announcement.createdAt || announcement.created_at).toLocaleDateString()}
          </div>
        </div>
      `).join('');
    }

    // Load announcements when page loads
    loadAnnouncements();
  </script>
</body>
</html>
